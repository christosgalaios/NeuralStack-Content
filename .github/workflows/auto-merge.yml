name: Auto-merge Claude PRs

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/') && github.event.action != 'closed'

    steps:
      - name: Enable auto-merge
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --squash \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  delete-branch:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/') && github.event.pull_request.merged == true

    steps:
      - name: Delete merged branch
        run: |
          gh api \
            --method DELETE \
            "/repos/${{ github.repository }}/git/refs/heads/${{ github.head_ref }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

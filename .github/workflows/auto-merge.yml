name: Auto-merge Claude PRs

on:
  pull_request:
    branches: ["main"]
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'claude/')

    steps:
      - name: Wait for tests to pass
        run: |
          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}
          echo "Waiting for test check on PR #$PR..."
          for i in $(seq 1 30); do
            STATUS=$(gh pr checks "$PR" --repo "$REPO" 2>&1 || true)
            echo "$STATUS"
            if echo "$STATUS" | grep -q "test.*pass"; then
              echo "Tests passed!"
              break
            fi
            if echo "$STATUS" | grep -q "test.*fail"; then
              echo "Tests failed — skipping merge"
              exit 1
            fi
            sleep 10
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Squash and merge
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash \
            --repo "${{ github.repository }}" \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

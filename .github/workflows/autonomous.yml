name: Autonomous Content Pipeline

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Runs on every push and PR — fast test gate ───────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

  # ── Runs on schedule / manual dispatch / push to main — full pipeline ───
  run-pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Run autonomous pipeline
        env:
          NEURALSTACK_BASE_URL: "https://devguide.co.uk"
          PYTHONUNBUFFERED: "1"
        run: python main.py

      - name: Commit new content (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ agents/
            git commit -m "chore: autonomous content update [skip ci]" || exit 0
            git push
          fi

  # ── Build and deploy to GitHub Pages ─────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Copy latest sitemap and feed to frontend
        run: |
          [ -f sitemap.xml ] && cp sitemap.xml frontend/public/sitemap.xml || true
          [ -f feed.xml ] && cp feed.xml frontend/public/feed.xml || true

      - name: Build static site
        env:
          NEXT_PUBLIC_BASE_URL: "https://devguide.co.uk"
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.ADSENSE_ID }}
        run: cd frontend && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

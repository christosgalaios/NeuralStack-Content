name: Autonomous Content Pipeline

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  # ── Runs on every push and PR — fast test gate ───────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Run tests
        run: python -m unittest discover -s tests -v

  # ── Runs on schedule / manual dispatch only — full autonomous pipeline ───
  run-pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip

      - name: Run autonomous pipeline
        env:
                  NEURALSTACK_BASE_URL: "https://neuralstackhello.co.uk"
          PYTHONUNBUFFERED: "1"
        run: python main.py

      - name: Commit and push changes (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: autonomous content update [skip ci]" || exit 0
            git push
          fi

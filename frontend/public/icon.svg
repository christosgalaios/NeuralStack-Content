<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="n-grad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0d4a5a"/>
      <stop offset="100%" stop-color="#1a8a9a"/>
    </linearGradient>
    <linearGradient id="s-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2da0b0"/>
      <stop offset="100%" stop-color="#4cc0d0"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#7a8494" stroke-width="3" opacity="0.4"/>

  <!-- Inner structural ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#7a8494" stroke-width="1.2" opacity="0.2"/>

  <!-- Cardinal markers: D-E-V-G -->
  <!-- Top: E -->
  <polygon points="50,2 44,12 50,7 56,12" fill="#9aa4b4" opacity="0.5"/>
  <text x="50" y="21" text-anchor="middle" font-size="7" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.8">E</text>

  <!-- Left: D -->
  <polygon points="2,50 12,56 7,50 12,44" fill="#9aa4b4" opacity="0.45"/>
  <text x="19" y="53" text-anchor="middle" font-size="7" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.7">D</text>

  <!-- Right: V -->
  <polygon points="98,50 88,44 93,50 88,56" fill="#9aa4b4" opacity="0.45"/>
  <text x="81" y="53" text-anchor="middle" font-size="7" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.7">V</text>

  <!-- Bottom: G -->
  <polygon points="50,98 56,88 50,93 44,88" fill="#9aa4b4" opacity="0.45"/>
  <text x="50" y="86" text-anchor="middle" font-size="7" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.7">G</text>

  <!-- Inner < / > code symbols -->
  <text x="31" y="53" text-anchor="middle" font-size="8" font-weight="700" font-family="monospace" fill="#4cc0d0" opacity="0.25">&lt;</text>
  <text x="50" y="53" text-anchor="middle" font-size="8" font-weight="700" font-family="monospace" fill="#4cc0d0" opacity="0.25">/</text>
  <text x="69" y="53" text-anchor="middle" font-size="8" font-weight="700" font-family="monospace" fill="#4cc0d0" opacity="0.25">&gt;</text>

  <!-- North needle -->
  <path d="M50,8 L43,30 L36,44 L45,50 L50,43 L55,50 L64,44 L57,30 Z" fill="url(#n-grad)"/>

  <!-- South needle -->
  <path d="M50,92 L57,70 L64,56 L55,50 L50,57 L45,50 L36,56 L43,70 Z" fill="url(#s-grad)" opacity="0.35"/>

  <!-- Center pivot -->
  <circle cx="50" cy="50" r="5" fill="#e2e8f0"/>
  <circle cx="50" cy="50" r="2.5" fill="#0d4a5a"/>
</svg>

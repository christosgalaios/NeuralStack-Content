<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="needle" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a6b7a"/>
      <stop offset="100%" stop-color="#4db8c9"/>
    </linearGradient>
    <linearGradient id="needle-light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4db8c9"/>
      <stop offset="100%" stop-color="#7dd3e1"/>
    </linearGradient>
  </defs>
  <!-- Outer compass ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#6b7280" stroke-width="3" opacity="0.5"/>
  <!-- Inner compass ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#6b7280" stroke-width="1.5" opacity="0.3"/>
  <!-- Cardinal tick marks -->
  <line x1="50" y1="2" x2="50" y2="14" stroke="#6b7280" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="98" y1="50" x2="86" y2="50" stroke="#6b7280" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="50" y1="98" x2="50" y2="86" stroke="#6b7280" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="2" y1="50" x2="14" y2="50" stroke="#6b7280" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Diagonal ticks -->
  <line x1="84" y1="16" x2="76" y2="24" stroke="#6b7280" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="84" y1="84" x2="76" y2="76" stroke="#6b7280" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="16" y1="84" x2="24" y2="76" stroke="#6b7280" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="16" y1="16" x2="24" y2="24" stroke="#6b7280" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <!-- Compass needle — north (dark teal) -->
  <polygon points="50,14 42,50 50,44 58,50" fill="url(#needle)"/>
  <!-- Compass needle — south (lighter teal) -->
  <polygon points="50,86 58,50 50,56 42,50" fill="url(#needle-light)" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="4" fill="#4db8c9"/>
  <circle cx="50" cy="50" r="2" fill="#1a6b7a"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="needle-dark" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0a3d47"/>
      <stop offset="50%" stop-color="#126068"/>
      <stop offset="100%" stop-color="#1a7a8a"/>
    </linearGradient>
    <linearGradient id="needle-mid" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#16636f"/>
      <stop offset="100%" stop-color="#3aafbf"/>
    </linearGradient>
    <linearGradient id="needle-lo-dark" x1="0.8" y1="1" x2="0.2" y2="0">
      <stop offset="0%" stop-color="#0e4e58"/>
      <stop offset="100%" stop-color="#1a7a8a"/>
    </linearGradient>
    <linearGradient id="needle-lo-light" x1="0.8" y1="1" x2="0.2" y2="0">
      <stop offset="0%" stop-color="#2a8a96"/>
      <stop offset="100%" stop-color="#5bc4d4"/>
    </linearGradient>
    <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0c4cc"/>
      <stop offset="50%" stop-color="#a0a6b0"/>
      <stop offset="100%" stop-color="#c0c4cc"/>
    </linearGradient>
    <linearGradient id="rose-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a7a8a"/>
      <stop offset="100%" stop-color="#2a9aaa"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#ring-grad)" stroke-width="10" opacity="0.55"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#ring-grad)" stroke-width="6" opacity="0.35"/>

  <!-- Compass rose — 4 pointed star arms -->
  <!-- North -->
  <polygon points="100,8 80,68 100,54 120,68" fill="url(#rose-grad)" opacity="0.9"/>
  <!-- South -->
  <polygon points="100,192 120,132 100,146 80,132" fill="url(#rose-grad)" opacity="0.9"/>
  <!-- East -->
  <polygon points="192,100 132,80 146,100 132,120" fill="url(#rose-grad)" opacity="0.9"/>
  <!-- West -->
  <polygon points="8,100 68,120 54,100 68,80" fill="url(#rose-grad)" opacity="0.9"/>

  <!-- Main needle — wide blade from top-right to bottom-left -->
  <!-- Upper blade: dark half (left face) -->
  <polygon points="156,16 100,100 72,80" fill="url(#needle-dark)"/>
  <!-- Upper blade: light half (right face) -->
  <polygon points="156,16 100,100 120,128" fill="url(#needle-mid)" opacity="0.9"/>
  <!-- Lower blade: dark half (right face) -->
  <polygon points="44,184 100,100 128,120" fill="url(#needle-lo-dark)" opacity="0.6"/>
  <!-- Lower blade: light half (left face) -->
  <polygon points="44,184 100,100 80,72" fill="url(#needle-lo-light)" opacity="0.75"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="9" fill="white"/>
  <circle cx="100" cy="100" r="5.5" fill="#e8eaed"/>
</svg>

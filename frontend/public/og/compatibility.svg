<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="50%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#8b5cf6"/>
      <stop offset="80%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spotGlow)"/>
  <rect x="0" y="0" width="1200" height="180" fill="url(#glowGrad)"/>

  <!-- Compatibility theme: interlocking puzzle / connection nodes -->
  <!-- Node network -->
  <circle cx="950" cy="150" r="20" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.15"/>
  <circle cx="1050" cy="120" r="16" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.12"/>
  <circle cx="1100" cy="200" r="14" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.1"/>
  <circle cx="980" cy="240" r="18" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.12"/>
  <circle cx="1080" cy="300" r="12" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.08"/>

  <!-- Connection lines between nodes -->
  <line x1="968" y1="145" x2="1036" y2="125" stroke="#8b5cf6" stroke-width="0.8" opacity="0.1"/>
  <line x1="1062" y1="132" x2="1092" y2="190" stroke="#a78bfa" stroke-width="0.8" opacity="0.08"/>
  <line x1="960" y1="166" x2="975" y2="224" stroke="#8b5cf6" stroke-width="0.8" opacity="0.08"/>
  <line x1="995" y1="248" x2="1070" y2="295" stroke="#a78bfa" stroke-width="0.8" opacity="0.06"/>
  <line x1="1090" y1="212" x2="1082" y2="290" stroke="#8b5cf6" stroke-width="0.8" opacity="0.06"/>

  <!-- Node fill dots -->
  <circle cx="950" cy="150" r="3" fill="#8b5cf6" opacity="0.2"/>
  <circle cx="1050" cy="120" r="2.5" fill="#a78bfa" opacity="0.15"/>
  <circle cx="1100" cy="200" r="2" fill="#8b5cf6" opacity="0.12"/>
  <circle cx="980" cy="240" r="2.5" fill="#a78bfa" opacity="0.15"/>
  <circle cx="1080" cy="300" r="2" fill="#8b5cf6" opacity="0.1"/>

  <!-- Puzzle piece hints bottom-right -->
  <g opacity="0.08" transform="translate(920, 400)">
    <path d="M0,0 L40,0 L40,15 C40,15 50,10 50,20 C50,30 40,25 40,25 L40,40 L0,40 L0,25 C0,25 10,30 10,20 C10,10 0,15 0,15 Z" fill="#8b5cf6"/>
  </g>
  <g opacity="0.06" transform="translate(970, 440)">
    <path d="M0,0 L35,0 L35,12 C35,12 43,8 43,16 C43,24 35,20 35,20 L35,35 L0,35 L0,20 C0,20 8,24 8,16 C8,8 0,12 0,12 Z" fill="#a78bfa"/>
  </g>

  <!-- Floating hexagons -->
  <polygon points="1140,420 1155,428 1155,444 1140,452 1125,444 1125,428" fill="none" stroke="#8b5cf6" stroke-width="0.8" opacity="0.08"/>
  <polygon points="870,500 882,506 882,518 870,524 858,518 858,506" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.06"/>

  <!-- Grid dots -->
  <g opacity="0.1">
    <circle cx="100" cy="120" r="1.5" fill="#a78bfa"/>
    <circle cx="160" cy="120" r="1.5" fill="#a78bfa"/>
    <circle cx="220" cy="120" r="1.5" fill="#a78bfa"/>
    <circle cx="100" cy="180" r="1.5" fill="#a78bfa"/>
    <circle cx="160" cy="180" r="1.5" fill="#a78bfa"/>
    <circle cx="220" cy="180" r="1.5" fill="#a78bfa"/>
    <circle cx="100" cy="240" r="1.5" fill="#a78bfa"/>
    <circle cx="160" cy="240" r="1.5" fill="#a78bfa"/>
    <circle cx="220" cy="240" r="1.5" fill="#a78bfa"/>
  </g>

  <!-- Diagonal lines -->
  <line x1="780" y1="0" x2="1080" y2="300" stroke="#8b5cf6" stroke-width="0.5" opacity="0.05"/>
  <line x1="830" y1="630" x2="1130" y2="330" stroke="#a78bfa" stroke-width="0.5" opacity="0.04"/>

  <!-- Compass logo hint -->
  <g transform="translate(60, 42)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="14" cy="14" r="1.5" fill="#ffffff" opacity="0.9"/>
    <line x1="14" y1="4" x2="14" y2="8" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="14" y1="20" x2="14" y2="24" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="4" y1="14" x2="8" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="20" y1="14" x2="24" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="62" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#ffffff" letter-spacing="0.5">Dev Guide</text>

  <!-- Category name -->
  <text x="600" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#8b5cf6" text-anchor="middle" letter-spacing="2">COMPATIBILITY</text>

  <!-- Decorative line under category -->
  <line x1="420" y1="320" x2="780" y2="320" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
  <circle cx="420" cy="320" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="780" cy="320" r="3" fill="#8b5cf6" opacity="0.4"/>

  <!-- Description -->
  <text x="600" y="365" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">Integration and compatibility deep dives</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#bottomLine)"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.1"/>
</svg>
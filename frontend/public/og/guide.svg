<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="50%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#64748b"/>
      <stop offset="80%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spotGlow)"/>

  <!-- Top ambient glow -->
  <rect x="0" y="0" width="1200" height="200" fill="url(#glowGrad)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.12">
    <circle cx="100" cy="100" r="1.5" fill="#94a3b8"/>
    <circle cx="160" cy="100" r="1.5" fill="#94a3b8"/>
    <circle cx="220" cy="100" r="1.5" fill="#94a3b8"/>
    <circle cx="280" cy="100" r="1.5" fill="#94a3b8"/>
    <circle cx="340" cy="100" r="1.5" fill="#94a3b8"/>
    <circle cx="100" cy="160" r="1.5" fill="#94a3b8"/>
    <circle cx="160" cy="160" r="1.5" fill="#94a3b8"/>
    <circle cx="220" cy="160" r="1.5" fill="#94a3b8"/>
    <circle cx="280" cy="160" r="1.5" fill="#94a3b8"/>
    <circle cx="340" cy="160" r="1.5" fill="#94a3b8"/>
    <circle cx="100" cy="220" r="1.5" fill="#94a3b8"/>
    <circle cx="160" cy="220" r="1.5" fill="#94a3b8"/>
    <circle cx="220" cy="220" r="1.5" fill="#94a3b8"/>
    <circle cx="280" cy="220" r="1.5" fill="#94a3b8"/>
    <circle cx="340" cy="220" r="1.5" fill="#94a3b8"/>
  </g>

  <!-- Geometric decorations - guide theme: compass/direction lines -->
  <!-- Large circle outline top-right -->
  <circle cx="1050" cy="150" r="120" fill="none" stroke="#64748b" stroke-width="1" opacity="0.15"/>
  <circle cx="1050" cy="150" r="80" fill="none" stroke="#94a3b8" stroke-width="0.5" opacity="0.1"/>

  <!-- Diagonal guide lines -->
  <line x1="800" y1="0" x2="1200" y2="400" stroke="#64748b" stroke-width="0.5" opacity="0.08"/>
  <line x1="850" y1="0" x2="1200" y2="350" stroke="#94a3b8" stroke-width="0.5" opacity="0.06"/>
  <line x1="900" y1="630" x2="1200" y2="330" stroke="#64748b" stroke-width="0.5" opacity="0.08"/>

  <!-- Floating geometric shapes -->
  <rect x="950" y="400" width="40" height="40" fill="none" stroke="#64748b" stroke-width="1" opacity="0.12" transform="rotate(45 970 420)"/>
  <rect x="880" y="480" width="24" height="24" fill="none" stroke="#94a3b8" stroke-width="0.5" opacity="0.1" transform="rotate(30 892 492)"/>

  <!-- Small accent circles -->
  <circle cx="1100" cy="350" r="4" fill="#64748b" opacity="0.2"/>
  <circle cx="1140" cy="380" r="2" fill="#94a3b8" opacity="0.15"/>
  <circle cx="850" cy="200" r="3" fill="#64748b" opacity="0.15"/>

  <!-- Compass logo hint near brand -->
  <g transform="translate(60, 42)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="14" cy="14" r="1.5" fill="#ffffff" opacity="0.9"/>
    <line x1="14" y1="4" x2="14" y2="8" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="14" y1="20" x2="14" y2="24" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="4" y1="14" x2="8" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="20" y1="14" x2="24" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="62" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#ffffff" letter-spacing="0.5">Dev Guide</text>

  <!-- Category name -->
  <text x="600" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="2">GUIDE</text>

  <!-- Decorative line under category -->
  <line x1="520" y1="320" x2="680" y2="320" stroke="#64748b" stroke-width="2" opacity="0.4"/>
  <circle cx="520" cy="320" r="3" fill="#64748b" opacity="0.4"/>
  <circle cx="680" cy="320" r="3" fill="#64748b" opacity="0.4"/>

  <!-- Description -->
  <text x="600" y="365" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">Step-by-step technical walkthroughs</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#bottomLine)"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#64748b" stroke-width="1" opacity="0.1"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#bg)" opacity="0.4"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <g transform="translate(80, 40)">
    <circle cx="24" cy="24" r="20" stroke="#4db8c9" stroke-width="1.5" fill="none" opacity="0.4"/>
    <line x1="24" y1="2" x2="24" y2="8" stroke="#4db8c9" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="46" y1="24" x2="40" y2="24" stroke="#4db8c9" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="24" y1="46" x2="24" y2="40" stroke="#4db8c9" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="2" y1="24" x2="8" y2="24" stroke="#4db8c9" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <polygon points="24,8 21,24 24,21 27,24" fill="#1a6b7a"/>
    <polygon points="24,40 27,24 24,27 21,24" fill="#4db8c9" opacity="0.4"/>
    <circle cx="24" cy="24" r="2" fill="#4db8c9"/>
  </g>
  <text x="140" y="72" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#fafafa" letter-spacing="-0.02em">Dev Guide</text>
  <text x="80" y="300" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" fill="#ef4444" letter-spacing="-0.03em">News</text>
  <text x="80" y="360" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#a1a1aa">Technical news and analysis for global engineers.</text>
  <!-- Broadcast signal waves -->
  <g transform="translate(950, 200)" opacity="0.15">
    <polygon points="0,80 -15,0 15,0" stroke="#ef4444" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="-10" r="6" fill="#ef4444" opacity="0.5"/>
    <path d="M -40,-30 A 45 45 0 0 1 40,-30" stroke="#f87171" stroke-width="1.5" fill="none"/>
    <path d="M -65,-45 A 70 70 0 0 1 65,-45" stroke="#f87171" stroke-width="1.2" fill="none" opacity="0.7"/>
    <path d="M -90,-60 A 95 95 0 0 1 90,-60" stroke="#f87171" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
  <!-- Pulse dots -->
  <circle cx="820" cy="400" r="4" fill="#ef4444" opacity="0.15"/>
  <circle cx="870" cy="420" r="3" fill="#f87171" opacity="0.1"/>
  <circle cx="920" cy="390" r="5" fill="#ef4444" opacity="0.12"/>
  <circle cx="1000" cy="410" r="3" fill="#f87171" opacity="0.08"/>
  <!-- Data fragments -->
  <rect x="780" y="450" width="80" height="6" rx="3" fill="#ef4444" opacity="0.1"/>
  <rect x="880" y="450" width="50" height="6" rx="3" fill="#f87171" opacity="0.08"/>
  <rect x="780" y="466" width="60" height="6" rx="3" fill="#f87171" opacity="0.06"/>
  <text x="80" y="570" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#71717a">devguide.co.uk</text>
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>

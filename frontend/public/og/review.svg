<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="50%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#f59e0b"/>
      <stop offset="80%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spotGlow)"/>
  <rect x="0" y="0" width="1200" height="180" fill="url(#glowGrad)"/>

  <!-- Star rating pattern - review theme -->
  <g opacity="0.1" transform="translate(900, 80)">
    <polygon points="0,-20 5,-7 19,-7 8,3 12,17 0,9 -12,17 -8,3 -19,-7 -5,-7" fill="#f59e0b"/>
  </g>
  <g opacity="0.07" transform="translate(960, 120)">
    <polygon points="0,-16 4,-5.6 15.2,-5.6 6.4,2.4 9.6,13.6 0,7.2 -9.6,13.6 -6.4,2.4 -15.2,-5.6 -4,-5.6" fill="#fbbf24"/>
  </g>
  <g opacity="0.05" transform="translate(1020, 90)">
    <polygon points="0,-14 3.5,-4.9 13.3,-4.9 5.6,2.1 8.4,11.9 0,6.3 -8.4,11.9 -5.6,2.1 -13.3,-4.9 -3.5,-4.9" fill="#fbbf24"/>
  </g>

  <!-- Bar chart abstract - review/rating visual -->
  <g opacity="0.12" transform="translate(950, 350)">
    <rect x="0" y="60" width="20" height="80" fill="#f59e0b" rx="2"/>
    <rect x="30" y="30" width="20" height="110" fill="#fbbf24" rx="2"/>
    <rect x="60" y="45" width="20" height="95" fill="#f59e0b" rx="2"/>
    <rect x="90" y="15" width="20" height="125" fill="#fbbf24" rx="2"/>
    <rect x="120" y="50" width="20" height="90" fill="#f59e0b" rx="2"/>
  </g>

  <!-- Floating dots -->
  <circle cx="1100" cy="200" r="4" fill="#f59e0b" opacity="0.15"/>
  <circle cx="1150" cy="250" r="2.5" fill="#fbbf24" opacity="0.12"/>
  <circle cx="850" cy="150" r="3" fill="#f59e0b" opacity="0.1"/>
  <circle cx="150" cy="500" r="3" fill="#f59e0b" opacity="0.08"/>
  <circle cx="200" cy="530" r="2" fill="#fbbf24" opacity="0.06"/>

  <!-- Decorative lines -->
  <line x1="800" y1="0" x2="1100" y2="300" stroke="#f59e0b" stroke-width="0.5" opacity="0.06"/>
  <line x1="850" y1="630" x2="1150" y2="330" stroke="#fbbf24" stroke-width="0.5" opacity="0.05"/>

  <!-- Grid dots -->
  <g opacity="0.1">
    <circle cx="100" cy="120" r="1.5" fill="#fbbf24"/>
    <circle cx="160" cy="120" r="1.5" fill="#fbbf24"/>
    <circle cx="220" cy="120" r="1.5" fill="#fbbf24"/>
    <circle cx="100" cy="180" r="1.5" fill="#fbbf24"/>
    <circle cx="160" cy="180" r="1.5" fill="#fbbf24"/>
    <circle cx="220" cy="180" r="1.5" fill="#fbbf24"/>
    <circle cx="100" cy="240" r="1.5" fill="#fbbf24"/>
    <circle cx="160" cy="240" r="1.5" fill="#fbbf24"/>
    <circle cx="220" cy="240" r="1.5" fill="#fbbf24"/>
  </g>

  <!-- Compass logo hint -->
  <g transform="translate(60, 42)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="14" cy="14" r="1.5" fill="#ffffff" opacity="0.9"/>
    <line x1="14" y1="4" x2="14" y2="8" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="14" y1="20" x2="14" y2="24" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="4" y1="14" x2="8" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="20" y1="14" x2="24" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="62" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#ffffff" letter-spacing="0.5">Dev Guide</text>

  <!-- Category name -->
  <text x="600" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#f59e0b" text-anchor="middle" letter-spacing="2">REVIEW</text>

  <!-- Decorative line under category -->
  <line x1="510" y1="320" x2="690" y2="320" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
  <circle cx="510" cy="320" r="3" fill="#f59e0b" opacity="0.4"/>
  <circle cx="690" cy="320" r="3" fill="#f59e0b" opacity="0.4"/>

  <!-- Description -->
  <text x="600" y="365" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">In-depth tool and platform evaluations</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#bottomLine)"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>
</svg>
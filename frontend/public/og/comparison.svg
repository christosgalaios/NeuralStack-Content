<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="50%" stop-color="#0f0f11"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spotGlow)"/>
  <rect x="0" y="0" width="1200" height="180" fill="url(#glowGrad)"/>

  <!-- Comparison theme: two overlapping circles (Venn diagram) -->
  <circle cx="980" cy="180" r="90" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.12"/>
  <circle cx="1060" cy="180" r="90" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.12"/>
  <!-- Intersection highlight -->
  <ellipse cx="1020" cy="180" rx="30" ry="70" fill="#3b82f6" opacity="0.04"/>

  <!-- VS divider line motif -->
  <line x1="1020" y1="350" x2="1020" y2="550" stroke="#3b82f6" stroke-width="1" opacity="0.1" stroke-dasharray="4,6"/>

  <!-- Left comparison block -->
  <rect x="920" y="370" width="70" height="8" rx="4" fill="#3b82f6" opacity="0.1"/>
  <rect x="920" y="390" width="55" height="8" rx="4" fill="#3b82f6" opacity="0.07"/>
  <rect x="920" y="410" width="65" height="8" rx="4" fill="#3b82f6" opacity="0.05"/>
  <rect x="920" y="430" width="50" height="8" rx="4" fill="#60a5fa" opacity="0.07"/>
  <rect x="920" y="450" width="60" height="8" rx="4" fill="#3b82f6" opacity="0.05"/>

  <!-- Right comparison block -->
  <rect x="1050" y="370" width="65" height="8" rx="4" fill="#60a5fa" opacity="0.1"/>
  <rect x="1050" y="390" width="70" height="8" rx="4" fill="#60a5fa" opacity="0.07"/>
  <rect x="1050" y="410" width="50" height="8" rx="4" fill="#3b82f6" opacity="0.05"/>
  <rect x="1050" y="430" width="60" height="8" rx="4" fill="#60a5fa" opacity="0.07"/>
  <rect x="1050" y="450" width="55" height="8" rx="4" fill="#3b82f6" opacity="0.05"/>

  <!-- Arrows pointing inward -->
  <polygon points="950,320 960,310 960,330" fill="#3b82f6" opacity="0.1" transform="rotate(90 955 320)"/>
  <polygon points="1090,320 1080,310 1080,330" fill="#60a5fa" opacity="0.1" transform="rotate(-90 1085 320)"/>

  <!-- Floating dots -->
  <circle cx="850" cy="130" r="3" fill="#3b82f6" opacity="0.12"/>
  <circle cx="1150" cy="300" r="4" fill="#60a5fa" opacity="0.1"/>
  <circle cx="1130" cy="500" r="2.5" fill="#3b82f6" opacity="0.08"/>
  <circle cx="150" cy="480" r="3" fill="#3b82f6" opacity="0.06"/>

  <!-- Grid dots -->
  <g opacity="0.1">
    <circle cx="100" cy="120" r="1.5" fill="#60a5fa"/>
    <circle cx="160" cy="120" r="1.5" fill="#60a5fa"/>
    <circle cx="220" cy="120" r="1.5" fill="#60a5fa"/>
    <circle cx="280" cy="120" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="180" r="1.5" fill="#60a5fa"/>
    <circle cx="160" cy="180" r="1.5" fill="#60a5fa"/>
    <circle cx="220" cy="180" r="1.5" fill="#60a5fa"/>
    <circle cx="280" cy="180" r="1.5" fill="#60a5fa"/>
    <circle cx="100" cy="240" r="1.5" fill="#60a5fa"/>
    <circle cx="160" cy="240" r="1.5" fill="#60a5fa"/>
    <circle cx="220" cy="240" r="1.5" fill="#60a5fa"/>
    <circle cx="280" cy="240" r="1.5" fill="#60a5fa"/>
  </g>

  <!-- Diagonal lines -->
  <line x1="750" y1="0" x2="1050" y2="300" stroke="#3b82f6" stroke-width="0.5" opacity="0.05"/>
  <line x1="800" y1="630" x2="1100" y2="330" stroke="#60a5fa" stroke-width="0.5" opacity="0.04"/>

  <!-- Compass logo hint -->
  <g transform="translate(60, 42)">
    <circle cx="14" cy="14" r="12" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="14" cy="14" r="1.5" fill="#ffffff" opacity="0.9"/>
    <line x1="14" y1="4" x2="14" y2="8" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="14" y1="20" x2="14" y2="24" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="4" y1="14" x2="8" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="20" y1="14" x2="24" y2="14" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  </g>

  <!-- Brand name -->
  <text x="100" y="62" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="#ffffff" letter-spacing="0.5">Dev Guide</text>

  <!-- Category name -->
  <text x="600" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#3b82f6" text-anchor="middle" letter-spacing="2">COMPARISON</text>

  <!-- Decorative line under category -->
  <line x1="460" y1="320" x2="740" y2="320" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>
  <circle cx="460" cy="320" r="3" fill="#3b82f6" opacity="0.4"/>
  <circle cx="740" cy="320" r="3" fill="#3b82f6" opacity="0.4"/>

  <!-- Description -->
  <text x="600" y="365" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">Side-by-side technology comparisons</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#bottomLine)"/>

  <!-- Subtle border -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.1"/>
</svg>
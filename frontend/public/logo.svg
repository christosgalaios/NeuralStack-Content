<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="needle" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a6b7a"/>
      <stop offset="100%" stop-color="#4db8c9"/>
    </linearGradient>
    <linearGradient id="needle-light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4db8c9"/>
      <stop offset="100%" stop-color="#7dd3e1"/>
    </linearGradient>
  </defs>
  <circle cx="20" cy="20" r="17.5" fill="none" stroke="#6b7280" stroke-width="1.2" opacity="0.5"/>
  <circle cx="20" cy="20" r="14" fill="none" stroke="#6b7280" stroke-width="0.7" opacity="0.3"/>
  <!-- Cardinal ticks -->
  <line x1="20" y1="1" x2="20" y2="5.5" stroke="#6b7280" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="39" y1="20" x2="34.5" y2="20" stroke="#6b7280" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="20" y1="39" x2="20" y2="34.5" stroke="#6b7280" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="1" y1="20" x2="5.5" y2="20" stroke="#6b7280" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Needle north -->
  <polygon points="20,5.5 17,20 20,17.5 23,20" fill="url(#needle)"/>
  <!-- Needle south -->
  <polygon points="20,34.5 23,20 20,22.5 17,20" fill="url(#needle-light)" opacity="0.5"/>
  <!-- Center -->
  <circle cx="20" cy="20" r="1.6" fill="#4db8c9"/>
  <circle cx="20" cy="20" r="0.8" fill="#1a6b7a"/>
</svg>

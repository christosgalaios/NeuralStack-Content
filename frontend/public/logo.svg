<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="n-grad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0d4a5a"/>
      <stop offset="100%" stop-color="#1a8a9a"/>
    </linearGradient>
    <linearGradient id="s-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2da0b0"/>
      <stop offset="100%" stop-color="#4cc0d0"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="20" cy="20" r="17" fill="none" stroke="#7a8494" stroke-width="1.4" opacity="0.4"/>

  <!-- Inner ring -->
  <circle cx="20" cy="20" r="13.5" fill="none" stroke="#7a8494" stroke-width="0.5" opacity="0.2"/>

  <!-- Cardinal markers: D-E-V-G -->
  <!-- Top: E -->
  <polygon points="20,1 17,5 20,3 23,5" fill="#9aa4b4" opacity="0.55"/>
  <text x="20" y="8.5" text-anchor="middle" font-size="3.5" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.7">E</text>
  <!-- Left: D -->
  <polygon points="1,20 5,23 3,20 5,17" fill="#9aa4b4" opacity="0.45"/>
  <text x="8" y="21.3" text-anchor="middle" font-size="3.5" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.65">D</text>
  <!-- Right: V -->
  <polygon points="39,20 35,17 37,20 35,23" fill="#9aa4b4" opacity="0.45"/>
  <text x="32" y="21.3" text-anchor="middle" font-size="3.5" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.65">V</text>
  <!-- Bottom: G -->
  <polygon points="20,39 23,35 20,37 17,35" fill="#9aa4b4" opacity="0.4"/>
  <text x="20" y="34" text-anchor="middle" font-size="3.5" font-weight="800" font-family="Inter, system-ui, sans-serif" fill="#b0bac8" opacity="0.65">G</text>

  <!-- North needle -->
  <path d="M20,3 L17,12 L14.5,17.5 L18,20 L20,17 L22,20 L25.5,17.5 L23,12 Z" fill="url(#n-grad)"/>

  <!-- South needle -->
  <path d="M20,37 L23,28 L25.5,22.5 L22,20 L20,23 L18,20 L14.5,22.5 L17,28 Z" fill="url(#s-grad)" opacity="0.35"/>

  <!-- Center -->
  <circle cx="20" cy="20" r="2" fill="#e2e8f0"/>
  <circle cx="20" cy="20" r="1" fill="#0d4a5a"/>
</svg>
